<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Override || System Defense</title>
    <style>
        body {
            background-color: #050505;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        #ui-header {
            display: flex;
            justify-content: space-between;
            padding: 15px 30px;
            font-size: 1.5rem;
            text-shadow: 0 0 10px #00ff00;
            border-bottom: 1px solid #005500;
        }

        #game-board {
            flex-grow: 1;
            position: relative;
            background: radial-gradient(circle, #0a110a 0%, #000000 100%);
        }

        .falling-word {
            position: absolute;
            font-size: 1.2rem;
            text-shadow: 0 0 8px #00ff00;
            white-space: nowrap;
            letter-spacing: 2px;
        }

        #input-area {
            background-color: #000;
            border-top: 2px solid #00ff00;
            padding: 20px 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0px -5px 15px rgba(0, 255, 0, 0.2);
        }

        .prompt {
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 0 0 5px #00ff00;
        }

        input {
            background: transparent;
            border: none;
            color: #00ff00;
            font-family: inherit;
            font-size: 1.5rem;
            outline: none;
            width: 100%;
            text-shadow: 0 0 5px #00ff00;
        }

        #game-over-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
            z-index: 10;
        }

        .glitch-text {
            font-size: 4rem;
            color: red;
            text-shadow: 0 0 20px red;
            margin-bottom: 20px;
        }

        button {
            background-color: transparent;
            color: #00ff00;
            border: 2px solid #00ff00;
            padding: 10px 20px;
            font-family: inherit;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background-color: #00ff00;
            color: #000;
            box-shadow: 0 0 15px #00ff00;
        }
    </style>
</head>
<body>

    <div id="ui-header">
        <div>STATUS: <span id="status" style="color: #00ff00;">SECURE</span></div>
        <div>THREATS NEUTRALIZED: <span id="score">0</span></div>
    </div>

    <div id="game-board">
        <div id="game-over-screen">
            <div class="glitch-text">MAINFRAME BREACHED</div>
            <button onclick="location.reload()">INITIATE REBOOT SEQUENCE</button>
        </div>
    </div>

    <div id="input-area">
        <span class="prompt">guest@sqi-terminal:~$</span>
        <input type="text" id="type-input" autocomplete="off" spellcheck="false" autofocus>
    </div>

    <script src="script.js"></script>
</body>
</html>
